{{ define "main" }}
<div class="hx-mx-auto hx-flex hx-justify-center">
  <article class="hx-w-full hx-min-w-0 hx-max-w-6xl hx-px-1 hx-md:px-6">
    <main class="hx-w-full hx-min-w-0 hx-max-w-4xl hx-mx-auto hx-relative">

      {{ partial "breadcrumb.html" (dict "page" . "enable" true) }}

      <div class="hx-mt-1.5 hx-mb-8">
        <h1 class="hx-mt-2 hx-mb-4 hx-text-4xl hx-font-bold hx-tracking-tight hx-text-slate-900 dark:hx-text-slate-100">
          {{ .Title }}
        </h1>

        {{ if .Params.description }}
        <p class="hx-mt-6 hx-text-xl hx-text-slate-700 dark:hx-text-slate-400">
          {{ .Params.description }}
        </p>
        {{ end }}
      </div>

      <div class="hx-content">
        {{ .Content }}
      </div>

      {{ partial "custom/chapter-support-cta.html" . }}

      <div class="hx-mt-16">
        {{ partial "components/pager.html" . }}
      </div>

    </main>
  </article>
</div>
{{ end }}
