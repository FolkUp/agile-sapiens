# NGINX Configuration for AGILE SAPIENS English Domain
# Domain: en.agile.folkup.work
# ADR-07: Separate Domains Architecture - Phase 1

server {
    listen 80;
    server_name en.agile.folkup.work;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name en.agile.folkup.work;

    # SSL Configuration
    ssl_certificate /etc/ssl/certs/agile.folkup.work.crt;
    ssl_certificate_key /etc/ssl/private/agile.folkup.work.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Document root for English build
    root /var/www/agile-sapiens/public-en;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' ko-fi.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: ko-fi.com; connect-src 'self' ko-fi.com; frame-src ko-fi.com;" always;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private must-revalidate auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/ld+json;

    # Cache Control
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Main content
    location / {
        try_files $uri $uri/ =404;

        # Add security headers for HTML pages
        location ~* \.html$ {
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # Robots.txt
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nAllow: /\nSitemap: https://en.agile.folkup.work/sitemap.xml\n";
    }

    # Sitemap
    location = /sitemap.xml {
        add_header Content-Type application/xml;
        expires 1h;
    }

    # Health check endpoint
    location = /health {
        add_header Content-Type text/plain;
        return 200 "OK - AGILE SAPIENS English Domain";
    }

    # Cross-domain references
    location = /.well-known/alternate-languages {
        add_header Content-Type application/json;
        return 200 '{"languages": [{"lang": "en", "url": "https://en.agile.folkup.work/"}, {"lang": "ru", "url": "https://ru.agile.folkup.work/"}]}';
    }

    # Redirect old domain for transition period
    # Remove after DNS migration complete
    if ($http_host = "sapiens.folkup.life") {
        return 301 https://en.agile.folkup.work$request_uri;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # Logging
    access_log /var/log/nginx/agile-sapiens-en.access.log;
    error_log /var/log/nginx/agile-sapiens-en.error.log;
}

# Additional security: block access to sensitive files
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

location ~ ~$ {
    deny all;
    access_log off;
    log_not_found off;
}