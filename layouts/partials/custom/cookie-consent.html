{{/* Cookie Consent Corner Toast - GDPR Compliant, Palette D, i18n */}}
<div id="cookie-banner" class="cookie-banner" role="dialog" aria-labelledby="cookie-banner-title" aria-describedby="cookie-banner-desc" style="display: none;">
  <div class="cookie-content">
    <div class="cookie-text">
      <p id="cookie-banner-title" class="cookie-title"><strong>🍪 {{ T "cookie_title" }}</strong></p>
      <p id="cookie-banner-desc">
        {{ T "cookie_message" }}
        <a href="/legal/cookies/" target="_blank" rel="noopener">{{ T "cookie_learn_more" }}</a>
      </p>
    </div>
    <div class="cookie-buttons">
      <button id="cookie-reject" class="cookie-btn cookie-btn-secondary" type="button">{{ T "cookie_essential_only" }}</button>
      <button id="cookie-accept" class="cookie-btn cookie-btn-primary" type="button">{{ T "cookie_accept_all" }}</button>
    </div>
  </div>
</div>

{{/* Cookie preference management (shows after initial choice) */}}
<div id="cookie-settings-toggle" class="cookie-settings-toggle" style="display: none;">
  <button id="show-cookie-settings" class="cookie-settings-btn" type="button" title="{{ T "cookie_settings" }}" aria-label="{{ T "cookie_settings" }}">
    🍪
  </button>
</div>

<style>
.cookie-banner {
  position: fixed;
  bottom: 1.25rem;
  right: 1.25rem;
  max-width: 380px;
  background: rgba(42, 35, 23, 0.97);
  color: #FEFCF6;
  z-index: 9999;
  padding: 1.1rem 1.25rem;
  border-radius: 10px;
  border: 1px solid #7D4450;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
  backdrop-filter: blur(8px);
}

.cookie-content {
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
}

.cookie-text {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}

.cookie-text .cookie-title {
  margin: 0 0 0.5rem;
  font-size: 1.1rem;
  font-weight: 600;
}

.cookie-text p {
  margin: 0;
  font-size: 0.9rem;
  line-height: 1.4;
}

.cookie-text a {
  text-decoration: underline;
  font-weight: 500;
  color: #E8AD4A;
}

.cookie-buttons {
  display: flex;
  gap: 0.6rem;
  flex-wrap: wrap;
}

.cookie-btn {
  flex: 1 1 auto;
  padding: 0.75rem 1.25rem;
  min-height: 44px;
  min-width: 44px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.9rem;
  transition: background 0.2s ease, transform 0.15s ease;
}

.cookie-btn:focus-visible {
  outline: 2px solid #E8AD4A;
  outline-offset: 2px;
}

.cookie-btn-primary {
  background: #7D4450;
  color: #FEFCF6;
}

.cookie-btn-primary:hover {
  background: #5a2f38;
  transform: translateY(-1px);
}

.cookie-btn-secondary {
  background: #475569;
  color: #FEFCF6;
}

.cookie-btn-secondary:hover {
  background: #334155;
  transform: translateY(-1px);
}

.cookie-settings-toggle {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9998;
}

.cookie-settings-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;
  background: #7D4450;
  color: #FEFCF6;
  font-size: 1.2rem;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(125, 68, 80, 0.3);
  transition: all 0.2s ease;
}

.cookie-settings-btn:hover {
  background: #5a2f38;
  transform: scale(1.1);
}

/* Dark mode — deeper bg, same bordeaux border */
[data-theme="dark"] .cookie-banner {
  background: rgba(20, 17, 11, 0.97);
  border-color: #7D4450;
}

/* Mobile — full-width bottom sheet, not corner toast */
@media (max-width: 600px) {
  .cookie-banner {
    left: 0.75rem;
    right: 0.75rem;
    bottom: 0.75rem;
    max-width: none;
  }
  .cookie-content {
    text-align: left;
  }

  .cookie-text {
    min-width: auto;
  }

  .cookie-buttons {
    justify-content: center;
  }

  .cookie-btn {
    min-width: 140px;
    min-height: 48px;
    padding: 0.875rem 1.25rem;
  }
}
</style>

<script>
(function() {
  'use strict';

  // Cookie utility functions
  const CookieConsent = {
    CONSENT_COOKIE: 'folkup-cookie-consent',
    BANNER_ID: 'cookie-banner',
    SETTINGS_ID: 'cookie-settings-toggle',

    setCookie: function(name, value, days) {
      const expires = new Date();
      expires.setTime(expires.getTime() + (days * 24 * 60 * 60 * 1000));
      document.cookie = name + '=' + value + ';expires=' + expires.toUTCString() + ';path=/;SameSite=Lax';
    },

    getCookie: function(name) {
      const nameEQ = name + '=';
      const ca = document.cookie.split(';');
      for(let i = 0; i < ca.length; i++) {
        let c = ca[i];
        while (c.charAt(0) === ' ') c = c.substring(1, c.length);
        if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
      }
      return null;
    },

    hasConsent: function() {
      return this.getCookie(this.CONSENT_COOKIE) !== null;
    },

    getConsentLevel: function() {
      return this.getCookie(this.CONSENT_COOKIE) || 'none';
    },

    giveConsent: function(level) {
      this.setCookie(this.CONSENT_COOKIE, level, 365);
      this.hideBanner();
      this.showSettings();
      this.enableCookies(level);

      // Dispatch custom event for analytics/tracking initialization
      window.dispatchEvent(new CustomEvent('cookieConsentGiven', {
        detail: { level: level }
      }));
    },

    enableCookies: function(level) {
      if (level === 'all') {
        // Enable all non-essential cookies/tracking
        this.enableThirdPartyWidgets();
        this.enableAnalytics();
      } else if (level === 'essential') {
        // Only essential cookies (already enabled by default)
        this.blockThirdPartyWidgets();
      }
    },

    enableThirdPartyWidgets: function() {
      // Unblock Ko-fi and other widgets
      const blockedWidgets = document.querySelectorAll('[data-cookie-blocked]');
      blockedWidgets.forEach(widget => {
        widget.removeAttribute('data-cookie-blocked');
        // Restore original content if stored
        const originalContent = widget.getAttribute('data-original-content');
        if (originalContent) {
          widget.innerHTML = originalContent;
          widget.removeAttribute('data-original-content');
        }
      });
    },

    blockThirdPartyWidgets: function() {
      // This would be called to re-block widgets if consent is withdrawn
      // Implementation depends on specific widgets used
    },

    enableAnalytics: function() {
      // Enable analytics if implemented in the future
      // This is where Google Analytics, Umami, etc. would be initialized
      console.log('Analytics consent given - ready for implementation');
    },

    showBanner: function() {
      const banner = document.getElementById(this.BANNER_ID);
      if (banner) {
        banner.style.display = 'block';
        // Add animation
        requestAnimationFrame(() => {
          banner.style.opacity = '0';
          banner.style.transform = 'translateY(100%)';
          banner.style.transition = 'all 0.3s ease';
          requestAnimationFrame(() => {
            banner.style.opacity = '1';
            banner.style.transform = 'translateY(0)';
          });
        });
      }
    },

    hideBanner: function() {
      const banner = document.getElementById(this.BANNER_ID);
      if (banner) {
        banner.style.transform = 'translateY(100%)';
        banner.style.opacity = '0';
        setTimeout(() => {
          banner.style.display = 'none';
        }, 300);
      }
    },

    showSettings: function() {
      const settings = document.getElementById(this.SETTINGS_ID);
      if (settings) {
        settings.style.display = 'block';
      }
    },

    resetConsent: function() {
      document.cookie = this.CONSENT_COOKIE + '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
      location.reload();
    },

    init: function() {
      // Check if user has already given consent
      if (!this.hasConsent()) {
        // Show banner after a short delay for better UX
        setTimeout(() => {
          this.showBanner();
        }, 1000);
      } else {
        // Enable cookies based on previous consent
        const consentLevel = this.getConsentLevel();
        this.enableCookies(consentLevel);
        this.showSettings();
      }

      // Bind event listeners
      this.bindEvents();
    },

    bindEvents: function() {
      // Accept all cookies
      const acceptBtn = document.getElementById('cookie-accept');
      if (acceptBtn) {
        acceptBtn.addEventListener('click', () => {
          this.giveConsent('all');
        });
      }

      // Reject non-essential cookies
      const rejectBtn = document.getElementById('cookie-reject');
      if (rejectBtn) {
        rejectBtn.addEventListener('click', () => {
          this.giveConsent('essential');
        });
      }

      // Show settings to change preferences
      const settingsBtn = document.getElementById('show-cookie-settings');
      if (settingsBtn) {
        settingsBtn.addEventListener('click', () => {
          this.resetConsent();
        });
      }
    }
  };

  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => CookieConsent.init());
  } else {
    CookieConsent.init();
  }

  // Make CookieConsent globally available for debugging/external access
  window.CookieConsent = CookieConsent;
})();
</script>
