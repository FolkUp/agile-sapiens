# AGIL-073: Uptime Canary — zero-vendor monitoring
#
# Runs every 10 minutes against https://sapiens.folkup.life/.
# Checks: HTTP status (Basic Auth honored), TLS cert validity + days-to-expiry, response time.
# On failure → POST to Telegram supergroup Deploy Reports, topic "AGILE SAPIENS".
#
# Required GitHub Secrets:
#   PREVIEW_USER, PREVIEW_PASS  — Basic Auth (already set for build-deploy)
#   TELEGRAM_BOT_TOKEN          — @folkup_updates_bot token
#   TELEGRAM_AGILE_TOPIC        — Topic ID (message_thread_id) for "AGILE SAPIENS" topic
# Static (in workflow):
#   TELEGRAM_CHAT_ID = -1003596453051  (FolkUp Deploy Reports supergroup)
#
# Cost: GitHub-hosted runner, free tier (~432 min/month for */10 schedule = well within limits).

name: Uptime Canary

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: uptime-canary
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      DOMAIN: sapiens.folkup.life
      TG_CHAT_ID: '-1003596453051'
      CERT_WARN_DAYS: 14
    steps:
      - name: HTTP probe (Basic Auth)
        id: http
        run: |
          set +e
          # Use Basic Auth if configured, fall back to unauth (expect 401)
          if [ -n "${{ secrets.PREVIEW_USER }}" ] && [ -n "${{ secrets.PREVIEW_PASS }}" ]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 10 \
              -u "${{ secrets.PREVIEW_USER }}:${{ secrets.PREVIEW_PASS }}" \
              "https://${DOMAIN}/")
            EXPECTED=200
          else
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 10 "https://${DOMAIN}/")
            EXPECTED=401
          fi
          RESP_TIME=$(curl -s -o /dev/null -w "%{time_total}" -m 10 "https://${DOMAIN}/")
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          echo "expected=$EXPECTED" >> "$GITHUB_OUTPUT"
          echo "resp_time=$RESP_TIME" >> "$GITHUB_OUTPUT"
          if [ "$HTTP_CODE" = "$EXPECTED" ]; then
            echo "status=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "status=FAIL" >> "$GITHUB_OUTPUT"
          fi

      - name: TLS cert probe
        id: tls
        run: |
          set +e
          CERT_END=$(echo | openssl s_client -connect "${DOMAIN}:443" -servername "${DOMAIN}" 2>/dev/null \
            | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2)
          if [ -z "$CERT_END" ]; then
            echo "cert_status=FAIL" >> "$GITHUB_OUTPUT"
            echo "cert_days=-1" >> "$GITHUB_OUTPUT"
            echo "cert_end=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CERT_END_EPOCH=$(date -d "$CERT_END" +%s)
          NOW_EPOCH=$(date +%s)
          DAYS=$(( (CERT_END_EPOCH - NOW_EPOCH) / 86400 ))
          echo "cert_days=$DAYS" >> "$GITHUB_OUTPUT"
          echo "cert_end=$CERT_END" >> "$GITHUB_OUTPUT"
          if [ "$DAYS" -lt "$CERT_WARN_DAYS" ]; then
            echo "cert_status=WARN" >> "$GITHUB_OUTPUT"
          else
            echo "cert_status=PASS" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide alert
        id: decide
        run: |
          HTTP="${{ steps.http.outputs.status }}"
          CERT="${{ steps.tls.outputs.cert_status }}"
          if [ "$HTTP" != "PASS" ] || [ "$CERT" = "FAIL" ] || [ "$CERT" = "WARN" ]; then
            echo "alert=true" >> "$GITHUB_OUTPUT"
          else
            echo "alert=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Telegram alert (on failure or cert warn)
        if: steps.decide.outputs.alert == 'true' && env.TG_TOKEN != '' && env.TG_TOPIC != ''
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_TOPIC: ${{ secrets.TELEGRAM_AGILE_TOPIC }}
        run: |
          HTTP="${{ steps.http.outputs.status }} (HTTP ${{ steps.http.outputs.http_code }} expected ${{ steps.http.outputs.expected }})"
          RESP="${{ steps.http.outputs.resp_time }}s"
          CERT="${{ steps.tls.outputs.cert_status }} (${{ steps.tls.outputs.cert_days }}d, expires ${{ steps.tls.outputs.cert_end }})"
          ICON="⚠️"
          if [ "${{ steps.http.outputs.status }}" != "PASS" ]; then ICON="❌"; fi
          MSG="${ICON} *AGILE SAPIENS — uptime canary alert*

*HTTP:* ${HTTP}
*Response time:* ${RESP}
*TLS cert:* ${CERT}

[GH Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "message_thread_id=${TG_TOPIC}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=${MSG}" \
            | grep -q '"ok":true' && echo "Telegram alert sent" || echo "Telegram alert FAILED"

      - name: Summary
        if: always()
        run: |
          echo "## Uptime Canary — sapiens.folkup.life" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| HTTP | ${{ steps.http.outputs.status }} | code=${{ steps.http.outputs.http_code }} expected=${{ steps.http.outputs.expected }} time=${{ steps.http.outputs.resp_time }}s |" >> $GITHUB_STEP_SUMMARY
          echo "| TLS  | ${{ steps.tls.outputs.cert_status }} | ${{ steps.tls.outputs.cert_days }} days to expiry (${{ steps.tls.outputs.cert_end }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Alert sent | ${{ steps.decide.outputs.alert }} | (only on FAIL or cert WARN) |" >> $GITHUB_STEP_SUMMARY

      - name: Fail job if probes failed
        if: steps.http.outputs.status != 'PASS'
        run: |
          echo "::error::HTTP probe failed: ${{ steps.http.outputs.http_code }}"
          exit 1
