baseURL = "https://sapiens.folkup.life"
languageCode = "en-us"
title = "AGILE SAPIENS"
theme = "hextra"
defaultContentLanguage = "en"

[params]
description = "A scientific popular monograph on the future of work in the AI age"
images = ["/assets/og-image-default.png"]
[params.author]
name = "FolkUp Ecosystem"
email = "info@folkup.app"

# FolkUp branding
logo = "/assets/folkup-logo.svg"
favicon = "/assets/favicon.ico"

# Primary colors (FolkUp palette subset)
[params.colors]
primary = "#2563eb"
secondary = "#64748b"

# Main navigation - will be inherited by languages
[[menu.main]]
name = "Home"
pageRef = "/"
weight = 10

[[menu.main]]
name = "Chapters"
pageRef = "/chapters"
weight = 20

[[menu.main]]
name = "Archive"
pageRef = "/archive"
weight = 30

[[menu.main]]
name = "About"
pageRef = "/about"
weight = 40

[[menu.main]]
name = "Legal"
pageRef = "/legal"
weight = 50

# Language switcher
[[menu.main]]
identifier = "language-switch"
name = "Language Switcher"
weight = 60
[menu.main.params]
type = "language-switch"
icon = "globe-alt"
label = true

# GDPR compliance settings
[params.gdpr]
enabled = true
cookie_consent = true
privacy_policy = "/legal/privacy/"
cookie_policy = "/legal/cookies/"
terms_url = "/legal/terms/"

[params.footer]
copyright = "© 2026 FolkUp Ecosystem. Content licensed under CC BY 4.0."

# Ko-fi support integration (FolkUp standard)
[params.kofi]
enabled = true
username = "folkup"
url = "https://ko-fi.com/folkup"

# SEO and metadata
[params.page]
width = "normal"

# Theme features
[params.theme]
default = "auto"
displayToggle = true

# Languages configuration with Ko-fi sidebar
[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    title = "AGILE SAPIENS"
    contentDir = "content"

    [languages.en.params]
    description = "A scientific popular monograph on the future of work in the AI age"

    [languages.en.menu]
      [[languages.en.menu.sidebar]]
        identifier = "kofi"
        name = "☕ Support on Ko-fi"
        url = "https://ko-fi.com/folkup"
        weight = 1

  [languages.ru]
    languageName = "Русский"
    weight = 2
    title = "AGILE SAPIENS"
    contentDir = "content"

    [languages.ru.params]
    description = "Научно-популярная монография о будущем работы в эпоху ИИ"

    [languages.ru.menu]
      [[languages.ru.menu.sidebar]]
        identifier = "kofi"
        name = "☕ Поддержать на Ko-fi"
        url = "https://ko-fi.com/folkup"
        weight = 1

# Table of contents
[markup.tableOfContents]
startLevel = 2
endLevel = 3

# SEO Configuration
[outputs]
home = ["HTML", "RSS"]
section = ["HTML", "RSS"]
page = ["HTML"]
taxonomy = ["HTML", "RSS"]
term = ["HTML"]

# Sitemap configuration
[sitemap]
changefreq = "weekly"
filename = "sitemap.xml"
priority = 0.8

# SEO headers and canonical URLs
[params.seo]
enableRobots = true
enableSitemap = true
canonicalURLs = true
enableSchemaOrg = true
