{{ define "main" }}
<div class="hx:mx-auto hx:flex hx:justify-center">
  <article class="hx:w-full hx:min-w-0 hx:max-w-6xl hx:px-1 hx:md:px-6">
    <main class="hx:w-full hx:min-w-0 hx:max-w-4xl hx:mx-auto hx:relative">

      {{ partial "breadcrumb.html" (dict "page" . "enable" true) }}

      <!-- Level 3 Typography Activation: Chapter Header с академическим стилем -->
      <header class="chapter-header hx:mt-1.5 hx:mb-8">
        <h1 class="chapter-title hx:mt-2 hx:mb-4 hx:text-4xl hx:font-bold hx:tracking-tight hx:text-slate-900 dark:hx:text-slate-100">
          {{ .Title }}
        </h1>

        {{ if .Params.description }}
        <p class="chapter-description hx:mt-6 hx:text-xl hx:text-slate-700 dark:hx:text-slate-400">
          {{ .Params.description }}
        </p>
        {{ end }}

        <!-- Typography Enhancement: Academic ornament separator -->
        <div class="section-break"></div>
      </header>

      <!-- Level 3 Typography Activation: Enhanced content wrapper с полной типографской системой -->
      <div class="content-enhanced classical-typography content-hierarchy drop-cap hx:content">
        {{ .Content }}
      </div>

      <!-- AGIL-096: removed chapter-support-cta.html per brand review (Фонарщик).
           Ko-fi belongs in footer only, not as loud per-chapter CTA.
           Academic monograph voice incompatible with donation-box after every chapter. -->

      <!-- Typography Enhancement: Chapter conclusion ornament -->
      <div class="chapter-conclusion">
        <hr class="ornamental-separator" />
      </div>

      <div class="hx:mt-16">
        {{ partial "components/pager.html" . }}
      </div>

    </main>
  </article>
</div>
{{ end }}
