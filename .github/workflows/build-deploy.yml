# AGIL-007: CI/CD Pipeline — Banking-Level Quality Gates
name: Build and Deploy Agile Sapiens

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "agile-sapiens-${{ github.ref }}"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  # Quality Gates — Banking-Level Standards
  quality-gates:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.7
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Hugo
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Quality Gate 1 — Hugo Build Validation
        run: |
          echo "=== QUALITY GATE 1: Hugo Build ==="
          hugo --gc --minify --quiet
          if [ $? -ne 0 ]; then
            echo "❌ Hugo build FAILED — Zero tolerance policy"
            exit 1
          fi
          echo "✅ Hugo build PASSED"

      - name: Quality Gate 2 — Level 1 Compliance
        run: |
          echo "=== QUALITY GATE 2: Level 1 Compliance ==="
          node scripts/validate-content.js --check=level1
          echo "✅ Level 1 compliance PASSED"

      - name: Quality Gate 3 — Voice Gate (AI Pattern Detection)
        run: |
          echo "=== QUALITY GATE 3: Voice Gate ==="
          node scripts/validate-content.js --check=voice-gate
          echo "✅ Voice Gate PASSED"

      - name: Quality Gate 4 — Frontmatter Schema Validation
        run: |
          echo "=== QUALITY GATE 4: Schema Validation ==="
          node scripts/validate-content.js --check=frontmatter
          echo "✅ Frontmatter validation PASSED"

      - name: Quality Gate 5 — Source Verification
        run: |
          echo "=== QUALITY GATE 5: Source Verification ==="
          node scripts/validate-content.js --check=sources
          echo "✅ Source verification PASSED"

      - name: Quality Gate 6 — Brand Consistency
        run: |
          echo "=== QUALITY GATE 6: Brand Consistency ==="
          node scripts/validate-content.js --check=brand
          echo "✅ Brand consistency PASSED"

      - name: Upload Quality Gate Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-results
          path: |
            quality-gate-report.json
            build-log.txt

  # Build Job — Only after Quality Gates PASS
  build:
    runs-on: ubuntu-latest
    needs: quality-gates
    env:
      HUGO_VERSION: 0.147.7
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Setup Hugo
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Build Production Site
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo --gc --minify --logLevel info
          echo "✅ Production build completed"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agile-sapiens-site
          path: ./public
          retention-days: 7

  # Deploy to VPS — Banking-Level Verification
  deploy-vps:
    runs-on: ubuntu-latest
    needs: [quality-gates, build]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment:
      name: production-vps
      url: https://sapiens.folkup.life
    steps:
      - name: Checkout (need scripts/deploy-to-vps.sh + scripts/purge-cloudflare.js)
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: agile-sapiens-site
          path: ./public

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_KEY: ${{ secrets.VPS_DEPLOY_KEY }}
        run: |
          echo "$VPS_KEY" > deployment_key
          chmod 600 deployment_key

          # Deploy with atomic operation
          bash scripts/deploy-to-vps.sh

          echo "✅ VPS deployment completed"

      - name: Purge CDN Cache
        env:
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
        run: |
          node scripts/purge-cloudflare.js
          echo "✅ CDN cache purged"

      - name: Post-Deploy Sanity Check
        run: |
          echo "=== POST-DEPLOY SANITY CHECK ==="
          # Tolerant check: any HTTP response (incl. 401 behind Basic Auth) = infra up
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://sapiens.folkup.life/ || echo "000")
          if [ "$STATUS" = "000" ]; then
            echo "❌ No HTTP response — likely DNS/container issue"
            exit 1
          fi
          echo "✅ HTTP response: $STATUS (401=Basic Auth active, 200=open)"

      - name: Notify Success
        if: success()
        run: |
          echo "🎉 AGIL-007 Pipeline COMPLETED successfully"
          echo "Site deployed: https://sapiens.folkup.life/"
          echo "Quality gates: ALL PASSED"

  # Smoke test — authenticated check behind Basic Auth (soft launch)
  # Separate job so deploy success isn't blocked on credential availability.
  smoke-test:
    runs-on: ubuntu-latest
    needs: [deploy-vps]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Authenticated health check
        env:
          PREVIEW_USER: ${{ secrets.PREVIEW_USER }}
          PREVIEW_PASS: ${{ secrets.PREVIEW_PASS }}
        run: |
          if [ -z "$PREVIEW_USER" ] || [ -z "$PREVIEW_PASS" ]; then
            echo "⚠️  PREVIEW_USER/PREVIEW_PASS secrets not set — skipping authenticated probe"
            echo "Fallback: verify nginx vhost responds with HSTS header"
            if curl -sI https://sapiens.folkup.life/ | grep -qi "Strict-Transport-Security"; then
              echo "✅ HSTS header present — nginx-sapiens vhost is serving"
            else
              echo "❌ HSTS header missing — wrong vhost or default 503"
              exit 1
            fi
          else
            echo "=== Authenticated health check ==="
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -u "$PREVIEW_USER:$PREVIEW_PASS" https://sapiens.folkup.life/)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Authenticated 200 OK"
            else
              echo "❌ Expected 200, got $STATUS"
              exit 1
            fi
          fi
          echo "Banking-level standards: MAINTAINED"