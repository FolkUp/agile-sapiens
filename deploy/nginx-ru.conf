# NGINX Configuration for AGILE SAPIENS Russian Domain
# Domain: ru.agile.folkup.work
# ADR-07: Separate Domains Architecture - Phase 2 (Future)

server {
    listen 80;
    server_name ru.agile.folkup.work;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ru.agile.folkup.work;

    # SSL Configuration (shared wildcard certificate)
    ssl_certificate /etc/ssl/certs/agile.folkup.work.crt;
    ssl_certificate_key /etc/ssl/private/agile.folkup.work.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Document root for Russian build
    root /var/www/agile-sapiens/public-ru;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' ko-fi.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: ko-fi.com; connect-src 'self' ko-fi.com; frame-src ko-fi.com;" always;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Language indicator
    add_header Content-Language "ru" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private must-revalidate auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/ld+json;

    # Cache Control
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Coming Soon redirect logic (remove when Russian content ready)
    # Temporary redirect to English domain for most paths
    location ~ ^/(chapters|about|archive|legal)/ {
        return 302 https://en.agile.folkup.work$request_uri;
    }

    # Main content
    location / {
        try_files $uri $uri/ =404;

        # Add security headers for HTML pages
        location ~* \.html$ {
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";

            # Coming soon notice for Russian pages
            add_header X-Coming-Soon "Russian translation in progress" always;
        }
    }

    # Robots.txt (restrict indexing until content ready)
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n# Russian version under development\n# Full content available at: https://en.agile.folkup.work/\n";
    }

    # Sitemap
    location = /sitemap.xml {
        add_header Content-Type application/xml;
        expires 1h;
    }

    # Health check endpoint
    location = /health {
        add_header Content-Type text/plain;
        return 200 "OK - AGILE SAPIENS Russian Domain (Coming Soon)";
    }

    # Cross-domain references
    location = /.well-known/alternate-languages {
        add_header Content-Type application/json;
        return 200 '{"languages": [{"lang": "en", "url": "https://en.agile.folkup.work/"}, {"lang": "ru", "url": "https://ru.agile.folkup.work/", "status": "coming_soon"}]}';
    }

    # Coming soon API endpoint
    location = /api/status {
        add_header Content-Type application/json;
        return 200 '{"status": "coming_soon", "message": "Русская версия находится в разработке", "progress": "infrastructure_ready", "full_version": "https://en.agile.folkup.work/"}';
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # Custom 404 for missing Russian content
    location = /404.html {
        internal;
        add_header Content-Type text/html;
        return 404 '<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><title>Страница не найдена - AGILE SAPIENS</title></head><body><h1>Страница не найдена</h1><p>Русская версия находится в разработке.</p><a href="https://en.agile.folkup.work/">Читать английскую версию</a></body></html>';
    }

    # Logging
    access_log /var/log/nginx/agile-sapiens-ru.access.log;
    error_log /var/log/nginx/agile-sapiens-ru.error.log;
}

# Additional security: block access to sensitive files
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

location ~ ~$ {
    deny all;
    access_log off;
    log_not_found off;
}